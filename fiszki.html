<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiszki: Walka z negatywnymi uczuciami (Dark Mode)</title>
    <style>
        :root {
            /* Paleta Dark Mode */
            --primary-color: #64B5F6; /* Jaśniejszy niebieski dla dobrego kontrastu */
            --accent-color: #FF8A65; /* Łagodny pomarańczowy */
            --background-color: #121212; /* Ciemne tło strony */
            --card-bg: #1E1E1E; /* Tło karty - nieco jaśniejsze niż tło strony */
            --text-color: #E0E0E0; /* Jasnoszary tekst, nie czysto biały, by nie męczył oczu */
            --button-hover: #42A5F5;
            --button-disabled: #333333;
            --button-disabled-text: #666666;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            max-width: 800px;
        }

        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            max-width: 700px;
            height: 450px;
            margin-bottom: 20px;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); /* Ciemniejszy i mocniejszy cień dla głębi */
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
            background-color: var(--card-bg);
            border-top: 6px solid var(--primary-color);
        }

        .flashcard-face.summary-card {
            border-top: 6px solid var(--accent-color);
        }

        .flashcard-front {
            align-items: center;
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
        }

        .flashcard-back {
            transform: rotateY(180deg);
            overflow-y: auto;
            font-size: 1.15rem;
            line-height: 1.6;
            align-items: flex-start;
            justify-content: flex-start;
        }

        .flashcard-back ul {
            padding-left: 20px;
            margin-top: 10px;
        }

        .flashcard-back li {
            margin-bottom: 15px;
        }

        .tag {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin-bottom: 15px;
            display: block;
            width: 100%;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            background-color: var(--primary-color);
            color: #121212; /* Ciemny tekst na jasnym przycisku */
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
            font-weight: bold;
        }

        button:hover {
            background-color: var(--button-hover);
        }

        button:disabled {
            background-color: var(--button-disabled);
            color: var(--button-disabled-text);
            cursor: not-allowed;
        }

        .progress {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #AAAAAA; /* Zmiana na jaśniejszy szary */
        }

        /* Stylizacja paska przewijania dla tekstu na odwrocie */
        .flashcard-back::-webkit-scrollbar {
            width: 8px;
        }
        .flashcard-back::-webkit-scrollbar-track {
            background: var(--card-bg); 
            border-radius: 4px;
        }
        .flashcard-back::-webkit-scrollbar-thumb {
            background: #555; 
            border-radius: 4px;
        }
        .flashcard-back::-webkit-scrollbar-thumb:hover {
            background: #777; 
        }
    </style>
</head>
<body>

    <h1>Możesz skutecznie walczyć z negatywnymi uczuciami</h1>
    
    <div class="flashcard-container">
        <div class="flashcard" id="flashcard" onclick="flipCard()">
            <div class="flashcard-face flashcard-front" id="card-front">
                </div>
            <div class="flashcard-face flashcard-back" id="card-back">
                </div>
        </div>
    </div>

    <div class="controls">
        <button id="prev-btn" onclick="prevCard()">&#8592; Poprzednia</button>
        <button id="next-btn" onclick="nextCard()">Następna &#8594;</button>
    </div>
    
    <div class="progress" id="progress">
        Karta 1 z X
    </div>

    <script>
        const cardsData = [
            // FISZKI Z AKAPITÓW
            {
                type: "Akapit 1, 2",
                question: "Z jakimi uczuciami i z jaką walką zmagał się apostoł Paweł?",
                answer: "Paweł był człowiekiem emocjonalnym i czasem walczył z negatywnymi uczuciami[cite: 16]. Toczył wewnętrzną walkę: z jednej strony szczerze chciał spełniać wolę Bożą, a z drugiej odczuwał pragnienia, które pchały go w stronę grzechu[cite: 18]."
            },
            {
                type: "Akapit 4, 5",
                question: "Jak przeszłość wpływała na emocje Pawła?",
                answer: "Zanim Paweł został chrześcijaninem, zrobił wiele złych rzeczy, których później żałował[cite: 24]. Dawne czyny nieraz wzbudzały w nim poczucie winy [cite: 26], a im dłużej był chrześcijaninem, tym bardziej mogło gryźć go sumienie[cite: 27]."
            },
            {
                type: "Akapit 6",
                question: "Czym był ‛cierń w ciele', z którym zmagał się apostoł?",
                answer: "Paweł zmagał się z czymś, co nazwał ‛cierniem w ciele'[cite: 33]. Mógł to być jakiś problem fizyczny lub emocjonalny, a ten obraz słowny wskazuje, że było to coś trudnego do zniesienia[cite: 34]."
            },
            {
                type: "Akapit 7",
                question: "Dlaczego Pawłowi było trudno robić to, co słuszne?",
                answer: "Paweł walczył ze swoimi słabościami[cite: 36]. Niedoskonałe ciało osłabiało jego postanowienie robienia tego, co słuszne [cite: 37], a grzeszne skłonności cały czas dawały o sobie znać[cite: 38]."
            },
            {
                type: "Akapit 8",
                question: "Jakie konkretne kroki Paweł opisywał w listach, aby pokonywać słabości?",
                answer: "Rozmyślał o tym, jak duch Boży pomaga jemu i współwyznawcom walczyć z grzesznymi skłonnościami[cite: 41]. Zastanawiał się, co powinien poprawić, szukał rad w Słowie Bożym i podejmował konkretne działania[cite: 43]."
            },
            {
                type: "Akapit 9, 10",
                question: "Co było dla Pawła źródłem radości i pomagało mu walczyć z negatywnymi uczuciami?",
                answer: "Cieszył się z dobrych wiadomości z odległych zborów [cite: 47] i z przyjaciół[cite: 48]. Pomagała mu też wiara w to, że okup został złożony również za niego [cite: 52], dzięki czemu był pewny, że Jehowa mu przebacza[cite: 53]."
            },
            {
                type: "Akapit 12",
                question: "Jak w walce z negatywnymi uczuciami pomaga nam dbanie o dobre zwyczaje duchowe?",
                answer: "Pielęgnowanie dobrych zwyczajów duchowych pomaga skupiać się na tym, co pozytywne[cite: 61]. Kiedy regularnie czytamy Słowo Boże, przygotowujemy się do zebrań i bierzemy w nich udział oraz angażujemy się w służbę, nabieramy duchowych sił[cite: 63]."
            },
            {
                type: "Akapit 16",
                question: "Jak modlitwa może nam pomóc w rozpoznaniu przyczyn naszych negatywnych uczuć?",
                answer: "Możemy z modlitwą przemyśleć, co wywołuje w nas negatywne uczucia[cite: 80]. Tak jak król Dawid, możemy prosić Jehowę, żeby pomógł nam zrozumieć, skąd się biorą nasze negatywne myśli i jak je pokonać[cite: 82]."
            },
            {
                type: "Akapit 17, 18",
                question: "Jakie tematy warto przeanalizować podczas studium osobistego, żeby budować pozytywne nastawienie?",
                answer: "Warto dostosować studium do swoich potrzeb[cite: 85]. Można przeanalizować tematy takie jak miłosierdzie, przebaczenie i lojalna miłość Jehowy[cite: 88], albo przestudiować postacie biblijne, z którymi możemy się utożsamić, np. Hioba[cite: 92, 93]."
            },
            {
                type: "Akapit 19, 20",
                question: "Jakie powinno być nasze nastawienie do przyszłości, nawet jeśli negatywne uczucia czasem wracają?",
                answer: "Nadal mogą zdarzać się dni, kiedy będziemy przygnębieni [cite: 97], jednak z pomocą Jehowy jesteśmy w stanie radzić sobie z negatywnymi uczuciami[cite: 97]. Z Jego pomocą możemy trzymać je pod kontrolą [cite: 100] i wyczekiwać czasu, gdy już zawsze będziemy myśleć pozytywnie[cite: 100]."
            },

            // FISZKI PODSUMOWUJĄCE
            {
                type: "Podsumowanie",
                question: "Dlaczego Paweł nieraz czuł się przygnębiony?",
                answer: `
                    <ul>
                        <li>Z powodu błędów popełnionych w przeszłości[cite: 23].</li>
                        <li>Z powodu ‛ciernia w ciele' — trudnego do zniesienia problemu fizycznego lub emocjonalnego[cite: 32, 33, 34].</li>
                        <li>Z powodu słabości i grzesznych skłonności, z którymi musiał walczyć[cite: 35, 36, 38].</li>
                    </ul>
                `
            },
            {
                type: "Podsumowanie",
                question: "Dzięki czemu mimo negatywnych uczuć Paweł zachowywał pozytywne nastawienie?",
                answer: `
                    <ul>
                        <li>Rozmyślał o działaniu ducha Bożego[cite: 41].</li>
                        <li>Cieszył się z dobrych wiadomości, przyjaciół i uznania Jehowy[cite: 47, 48, 49].</li>
                        <li>Pomagała mu wiara w okup i świadomość, że Jehowa przebacza mu na podstawie tej ofiary[cite: 52, 53].</li>
                    </ul>
                `
            },
            {
                type: "Podsumowanie",
                question: "Co pomoże nam walczyć z negatywnymi uczuciami?",
                answer: `
                    <ul>
                        <li>Dbanie o dobre zwyczaje duchowe (czytanie Słowa Bożego, zebrania, służba)[cite: 61, 63].</li>
                        <li>Modlitwa o to, by zrozumieć skąd się biorą nasze negatywne myśli i jak je pokonać[cite: 80, 82].</li>
                        <li>Dostosowanie studium osobistego do własnych potrzeb[cite: 85].</li>
                    </ul>
                `
            }
        ];

        let currentCardIndex = 0;
        const flashcardElement = document.getElementById('flashcard');
        const frontElement = document.getElementById('card-front');
        const backElement = document.getElementById('card-back');
        const progressElement = document.getElementById('progress');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function updateCard() {
            flashcardElement.classList.remove('is-flipped');
            
            setTimeout(() => {
                const cardData = cardsData[currentCardIndex];
                const isSummary = cardData.type === "Podsumowanie";
                
                if(isSummary) {
                    frontElement.classList.add('summary-card');
                    backElement.classList.add('summary-card');
                } else {
                    frontElement.classList.remove('summary-card');
                    backElement.classList.remove('summary-card');
                }

                frontElement.innerHTML = \`<span class="tag">\${cardData.type}</span>\${cardData.question}\`;
                backElement.innerHTML = cardData.answer;
                progressElement.innerText = \`Karta \${currentCardIndex + 1} z \${cardsData.length}\`;
                
                prevBtn.disabled = currentCardIndex === 0;
                nextBtn.disabled = currentCardIndex === cardsData.length - 1;
            }, 150); 
        }

        function flipCard() {
            flashcardElement.classList.toggle('is-flipped');
        }

        function nextCard() {
            if (currentCardIndex < cardsData.length - 1) {
                currentCardIndex++;
                updateCard();
            }
        }

        function prevCard() {
            if (currentCardIndex > 0) {
                currentCardIndex--;
                updateCard();
            }
        }

        document.addEventListener('keydown', function(event) {
            if(event.key === 'ArrowRight' || event.key === ' ') {
                if(!flashcardElement.classList.contains('is-flipped') && event.key === ' ') {
                    flipCard();
                } else if(currentCardIndex < cardsData.length - 1) {
                    nextCard();
                }
                if(event.key === ' ') event.preventDefault(); // Blokuje przewijanie strony spacją
            } else if(event.key === 'ArrowLeft') {
                prevCard();
            } else if(event.key === 'Enter') {
                flipCard();
            }
        });

        updateCard();
    </script>
</body>
</html>

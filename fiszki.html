<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblijne Fiszki do Strażnicy - Okup</title>
    <style>
        /* 1. Reset i podstawy */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            color: #E0E0E0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 2. Cząsteczki w tle (Canvas) */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 3. Układ główny aplikacji */
        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1;
        }

        /* 4. Mechanika kart 3D */
        .flashcard-container {
            perspective: 1200px; /* Perspektywa nadająca głębię 3D */
            width: 100%;
            max-width: 700px;
            height: 420px;
            position: relative;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            border-radius: 16px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        /* Efekt rozbłysku aktywowany z JS po zakończeniu obrotu */
        .flashcard.flash-effect {
            box-shadow: 0 0 25px 8px #64B5F6;
            transition: box-shadow 0.15s ease-out;
        }
        
        .flashcard.flash-effect-fade {
            box-shadow: 0 0 0px 0px transparent;
            transition: box-shadow 0.5s ease-in;
        }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Ukrywanie pleców karty */
            background-color: #1E1E1E;
            border-radius: 16px;
            padding: 45px 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            border: 1px solid #2A2A2A;
        }

        /* Front: Wyśrodkowany tekst */
        .flashcard-front {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Rewers: Wyśrodkowany pionowo i poziomo z powiększoną czcionką */
        .flashcard-back {
            transform: rotateY(180deg);
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Wyjątek: Karta podsumowująca (Summary Mode) */
        .flashcard-back.summary-mode {
            align-items: flex-start;
            justify-content: flex-start;
            text-align: left;
            overflow-y: auto;
        }

        /* 5. Typografia i kolory */
        .tag {
            background-color: transparent;
            color: #FF8A65;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: absolute;
            top: 25px;
            left: 25px;
        }
        
        .question-text {
            font-size: 1.8rem;
            font-weight: 500;
            color: #64B5F6;
            line-height: 1.3;
        }

        .answer-text {
            font-size: 1.4rem;
            line-height: 1.6;
            margin-top: 15px; /* Dystans od górnego tagu */
        }

        /* Wyjątki dla tekstu na karcie podsumowującej */
        .summary-mode .answer-text {
            font-size: 1.15rem;
            margin-top: 30px; 
            width: 100%;
        }
        
        .summary-mode ul {
            padding-left: 25px;
            margin-top: 15px;
        }
        
        .summary-mode li {
            margin-bottom: 12px;
            line-height: 1.5;
        }
        
        .summary-mode b {
            color: #64B5F6;
        }

        /* 6. Nawigacja i przyciski */
        .controls {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        button {
            background-color: #1E1E1E;
            color: #E0E0E0;
            border: 1px solid #333;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        button:hover:not(:disabled) {
            background-color: #2A2A2A;
            border-color: #64B5F6;
            color: #64B5F6;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .progress {
            font-size: 1.1rem;
            font-weight: 500;
            min-width: 75px;
            text-align: center;
            color: #64B5F6;
        }

        .hint {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #888;
            letter-spacing: 0.5px;
        }

        /* 7. Stopka z linkiem do źródła */
        .footer {
            padding: 20px;
            text-align: center;
            background-color: rgba(18, 18, 18, 0.9);
            border-top: 1px solid #2A2A2A;
            z-index: 1;
            width: 100%;
        }

        .footer a {
            color: #64B5F6;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #FF8A65;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="app-container">
        <div class="flashcard-container" id="flashcard-container">
            <div class="flashcard" id="flashcard">
                
                <div class="flashcard-face flashcard-front">
                    <div class="tag" id="card-tag-front">Tag</div>
                    <div class="question-text" id="card-question">Pytanie ładowane z JS...</div>
                </div>
                
                <div class="flashcard-face flashcard-back" id="card-back-face">
                    <div class="tag" id="card-tag-back">Odpowiedź</div>
                    <div class="answer-text" id="card-answer">Odpowiedź ładowana z JS...</div>
                </div>

            </div>
        </div>

        <div class="controls">
            <button id="btn-prev" onclick="prevCard()" disabled>&#8592; Poprzednia</button>
            <div class="progress" id="progress-text">1 / X</div>
            <button id="btn-next" onclick="nextCard()">Następna &#8594;</button>
        </div>
        
        <div class="hint">Naciśnij SPACJĘ by odwrócić | STRZAŁKI by nawigować</div>
    </div>

    <div class="footer">
        <a href="https://wol.jw.org/pl/wol/d/r12/lp-p/2026243" target="_blank" rel="noopener noreferrer">
            Źródło: Strażnica — „Dlaczego potrzebujemy okupu” (jw.org)
        </a>
    </div>

    <script>
        // --- 1. DANE FISZEK ---
        const cardsData = [
            { 
                tag: 'Akapity 1, 2', 
                question: 'W jakim sensie jako ludzkość potrzebujemy ratunku?', 
                answer: 'W wyniku buntu Adama cała ludzkość została uwięziona pod „gruzami” odziedziczonego grzechu. Nie potrafimy sami się z niego uwolnić, a stan ten nieuchronnie prowadzi do śmierci (Rzymian 6:23).', 
                isSummary: false 
            },
            { 
                tag: 'Akapit 3', 
                question: 'Przez co Jezus nas ratuje i z czym się to wiąże?', 
                answer: 'Ratuje nas przez złożoną ofiarę okupu. Zapewnia nam to trzy rzeczy: przebaczenie grzechów, uzdrowienie z grzesznego stanu oraz pojednanie z naszym Stwórcą.', 
                isSummary: false 
            },
            { 
                tag: 'Akapity 4, 5', 
                question: 'Dlaczego nikt z nas nie może twierdzić, że nie potrzebuje okupu?', 
                answer: 'Ponieważ każdy niedoskonały człowiek popełnia grzechy — czasem poważne, a czasem polegające na błędzie w mowie (Kazn. 7:20). Biblia mówi: „Jeżeli twierdzimy, że nie mamy grzechu, to oszukujemy samych siebie” (1 Jana 1:8).', 
                isSummary: false 
            },
            { 
                tag: 'Akapity 6, 7', 
                question: 'Co stanowi dla Jehowy podstawę do przebaczania naszych grzechów?', 
                answer: 'Podstawą prawną jest doskonała ofiara okupu złożona przez Jezusa (wcześniej zapowiadały ją ofiary ze zwierząt). Jehowa nie przymyka oczu na grzech, lecz okup w pełni zaspokaja wymogi Jego doskonałej sprawiedliwości.', 
                isSummary: false 
            },
            { 
                tag: 'Akapit 9', 
                question: 'Co oprócz samych złych czynów obejmuje biblijne pojęcie „grzechu”?', 
                answer: 'Obejmuje również stan, który dziedziczymy od chwili poczęcia (Ps. 51:5). Sprawia on, że nie tylko mamy skłonność do zła, ale też chorujemy, starzejemy się i w końcu umieramy.', 
                isSummary: false 
            },
            { 
                tag: 'Akapit 12', 
                question: 'Jaką realną nadzieję w kwestii uzdrowienia daje nam okup?', 
                answer: 'Dzięki niemu w nowym świecie zostaniemy uwolnieni z „niewoli zepsucia” (Rzym. 8:21). Całkowicie i trwale znikną nasze cierpienia fizyczne, psychiczne oraz emocjonalne.', 
                isSummary: false 
            },
            { 
                tag: 'Akapit 14', 
                question: 'Jak grzech wpłynął na relację ludzi z Bogiem?', 
                answer: 'Sprawił, że staliśmy się od Niego oddzieleni, a wręcz staliśmy się Jego wrogami. Doskonałe normy Jehowy nie pozwalają Mu tolerować grzechu, przez co powstała ogromna „wyrwa” między ludzkością a Stwórcą.', 
                isSummary: false 
            },
            { 
                tag: 'Akapit 15', 
                question: 'W jakim sensie ofiara okupu „ułagodziła” Jehowę?', 
                answer: 'Nie chodzi o uspokojenie emocji Boga, lecz o spełnienie wymogów Jego sprawiedliwości. Okup zbudował pomost nad „wyrwą” grzechu, otwierając nam drogę do przywrócenia bliskiej relacji i pojednania.', 
                isSummary: false 
            },
            { 
                tag: 'Akapit 18', 
                question: 'Jaka o wiele ważniejsza kwestia niż nasze wybawienie wiąże się z okupem?', 
                answer: 'Okup to przede wszystkim odpowiedź Jehowy na zarzuty Szatana wysunięte w Edenie. Dzięki niemu Bóg uświęca swoje imię i ostatecznie udowadnia, że jest Bogiem miłości.', 
                isSummary: false 
            },
            { 
                tag: 'Podsumowanie', 
                question: 'Główne myśli powtórkowe:<br>Jak okup zapewnia nam...', 
                answer: `
                    <span>Przypomnijmy sobie kluczowe wnioski z artykułu:</span>
                    <ul>
                        <li><b>Przebaczenie:</b> Daje Jehowie doskonałą podstawę prawną do okazywania nam miłosierdzia bez łamania własnych, doskonałych norm sprawiedliwości.</li>
                        <li><b>Uzdrowienie:</b> Stopniowo uwolni nas z "niewoli zepsucia", w przyszłości trwale usuwając wszelkie choroby, ból emocjonalny i śmierć odziedziczoną po Adamie.</li>
                        <li><b>Pojednanie:</b> Zaspokaja wymogi sprawiedliwości i zasypuje "wyrwę" spowodowaną grzechem, pozwalając nam na nowo stać się przyjaciółmi, a nawet dziećmi Bożymi.</li>
                    </ul>
                `, 
                isSummary: true 
            }
        ];

        let currentIndex = 0;
        let isFlipped = false;

        const flashcard = document.getElementById('flashcard');
        const cardTagFront = document.getElementById('card-tag-front');
        const cardTagBack = document.getElementById('card-tag-back');
        const cardQuestion = document.getElementById('card-question');
        const cardAnswer = document.getElementById('card-answer');
        const cardBackFace = document.getElementById('card-back-face');
        const progressText = document.getElementById('progress-text');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        // --- 2. LOGIKA KARTY ---
        function loadCard(index) {
            const data = cardsData[index];
            
            // Front
            cardTagFront.textContent = data.tag;
            cardQuestion.innerHTML = data.question;
            
            // Rewers
            cardTagBack.textContent = data.isSummary ? 'Wnioski' : 'Odpowiedź';
            cardAnswer.innerHTML = data.answer;

            // Logika wyjątku: Karta podsumowująca mniejsza czcionka i flex-start
            if (data.isSummary) {
                cardBackFace.classList.add('summary-mode');
            } else {
                cardBackFace.classList.remove('summary-mode');
            }

            // Aktualizacja UI
            progressText.textContent = `${index + 1} / ${cardsData.length}`;
            btnPrev.disabled = index === 0;
            btnNext.disabled = index === cardsData.length - 1;
            
            // Reset obrotu
            if (isFlipped) {
                flashcard.classList.remove('flipped');
                isFlipped = false;
            }
        }

        function flipCard() {
            isFlipped = !isFlipped;
            flashcard.classList.toggle('flipped');
        }

        function nextCard() {
            if (currentIndex < cardsData.length - 1) {
                currentIndex++;
                loadCard(currentIndex);
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                loadCard(currentIndex);
            }
        }

        // --- 3. EFEKT ROZBŁYSKU ---
        flashcard.addEventListener('transitionend', (e) => {
            if (e.propertyName === 'transform' && isFlipped) {
                flashcard.classList.remove('flash-effect-fade');
                flashcard.classList.add('flash-effect');
                
                setTimeout(() => {
                    flashcard.classList.remove('flash-effect');
                    flashcard.classList.add('flash-effect-fade');
                }, 150);
            }
        });

        // --- 4. STEROWANIE ---
        flashcard.addEventListener('click', flipCard);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault(); 
                flipCard();
            } else if (e.code === 'ArrowRight') {
                nextCard();
            } else if (e.code === 'ArrowLeft') {
                prevCard();
            }
        });

        // --- 5. CZĄSTECZKI W TLE (CANVAS) ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.8 - 0.4;
                this.speedY = Math.random() * 0.8 - 0.4;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = `rgba(100, 181, 246, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        // --- INICJALIZACJA ---
        initParticles();
        animateParticles();
        loadCard(currentIndex);

    </script>
</body>
</html>

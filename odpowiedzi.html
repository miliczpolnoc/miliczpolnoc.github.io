<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblijne Fiszki do Strażnicy</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1E1E1E;
            --text-color: #E0E0E0;
            --accent: #64B5F6;
            --tag-color: #FF8A65;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Tło cząsteczkowe */
        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            color: var(--accent);
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .tag {
            display: inline-block;
            background-color: rgba(255, 138, 101, 0.15);
            color: var(--tag-color);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* Kontener fiszki */
        .flashcard-container {
            width: 100%;
            height: 400px;
            perspective: 1000px;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            border-radius: 15px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        /* Przód i tył karty */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.3s ease;
        }

        .card-face.front {
            border-top: 5px solid var(--accent);
        }

        .card-face.back {
            transform: rotateY(180deg);
            border-top: 5px solid var(--tag-color);
            font-size: 1.4rem;
            line-height: 1.6;
        }

        /* Rozbłysk aktywowany po animacji */
        .flashcard.glow .card-face.back {
            box-shadow: 0 0 25px rgba(100, 181, 246, 0.4), 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Modyfikator dla fiszek podsumowujących */
        .card-face.back.summary-mode {
            font-size: 1.15rem;
            justify-content: flex-start;
            text-align: left;
            padding-top: 50px;
        }

        .question {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-color);
        }

        /* Kontrolki nawigacji */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        button {
            background-color: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: rgba(100, 181, 246, 0.1);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #counter {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--tag-color);
            min-width: 60px;
            text-align: center;
        }

        /* Instrukcja */
        .instructions {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 30px;
            text-align: center;
        }

        /* Stopka */
        footer {
            margin-top: auto;
            text-align: center;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        footer a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .flashcard-container {
                height: 450px;
            }
            .card-face {
                padding: 25px;
            }
            .question {
                font-size: 1.2rem;
            }
            .card-face.back {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="app-container">
        <header>
            <span class="tag">Studium Strażnicy</span>
            <h1>Biblijne Fiszki</h1>
        </header>

        <div class="flashcard-container" id="card-container" role="button" tabindex="0" aria-label="Kliknij, aby odwrócić fiszkę">
            <div class="flashcard" id="flashcard">
                <div class="card-face front">
                    <div class="question" id="card-front-text"></div>
                </div>
                <div class="card-face back" id="card-back-face">
                    <div id="card-back-text"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="prev-btn" aria-label="Poprzednia karta">← Poprzednia</button>
            <span id="counter">1 / 18</span>
            <button id="next-btn" aria-label="Następna karta">Następna →</button>
        </div>
        
        <div class="instructions">
            Użyj strzałek ⬅️ ➡️ do nawigacji. Naciśnij SPACJĘ lub ENTER, by odwrócić kartę.
        </div>

        <footer>
            <a href="https://www.jw.org/pl/" target="_blank">Źródło materiałów: jw.org</a>
        </footer>
    </div>

    <script>
        // Dane fiszek przygotowane na podstawie dostarczonego artykułu
        const cardsData = [
            {
                front: "1, 2. Dlaczego potrzebujemy ratunku? (Rzymian 7:22-24).",
                back: "Potrzebujemy ratunku, ponieważ po buncie Adama cała ludzkość stała się grzeszna i została niejako „uwięziona pod gruzami” odziedziczonego grzechu. Nie jesteśmy w stanie sami uwolnić się od tego stanu, który nieuchronnie prowadzi do śmierci.",
                isSummary: false
            },
            {
                front: "3. W jakim sensie okup może nas uratować?",
                back: "Okup ratuje nas, zapewniając trzy kluczowe korzyści: przebaczenie grzechów, uzdrowienie z grzesznego stanu oraz pojednanie z naszym Stwórcą, Jehową.",
                isSummary: false
            },
            {
                front: "4, 5. Dlaczego każdy z nas potrzebuje okupu? (Kaznodziei 7:20).",
                back: "Okupu potrzebujemy do uzyskania przebaczenia, ponieważ każdy niedoskonały człowiek popełnia grzechy — zarówno te poważne, jak i mniejsze, na przykład poprzez błędy w mowie. Nikt z nas nie może zgodnie z prawdą twierdzić, że jest bez grzechu.",
                isSummary: false
            },
            {
                front: "6, 7. Co stanowi dla Jehowy podstawę do przebaczania naszych grzechów?",
                back: "Podstawę prawną stanowi ofiara okupu złożona przez Jezusa. Ponieważ sprawiedliwość Jehowy jest doskonała, nie może On po prostu przymknąć oka na grzech; ofiara Jezusa (zapowiedziana przez starożytne ofiary ze zwierząt) spełnia wymogi tej sprawiedliwości.",
                isSummary: false
            },
            {
                front: "8. O czym możesz rozmyślać, przygotowując się do tegorocznej Pamiątki?",
                back: "Warto rozmyślać o tym, co przebaczenie Jehowy oznacza dla nas osobiście. Należy pamiętać, że dzięki krwi Jezusa możemy zostać oczyszczeni z wszelkich grzechów i nie musimy wciąż obwiniać się za dawne błędy, za które okazaliśmy skruchę, ponieważ to Bóg decyduje o miłosierdziu.",
                isSummary: false
            },
            {
                front: "9. Co oprócz czynów obejmuje słowo „grzech”? (Psalm 51:5).",
                back: "Słowo „grzech” odnosi się także do stanu odziedziczonego w chwili poczęcia. Ten grzeszny stan sprawia, że nasze ciała nie funkcjonują prawidłowo, co prowadzi do chorób, starzenia się i śmierci wszystkich ludzi, nawet tych, którzy nie popełnili jeszcze świadomego złego czynu.",
                isSummary: false
            },
            {
                front: "10. Jak grzeszny stan wpłynął na Adama i Ewę?",
                back: "Wywołał w nich wewnętrzny wstrząs i negatywne emocje: poczucie winy, wstyd przed Stwórcą, niepokój, niepewność oraz ból. Odczuli oni bezpośrednie konsekwencje złamania prawa Bożego zapisanego w ich sercach.",
                isSummary: false
            },
            {
                front: "11. Jak grzeszny stan wpływa na nas?",
                back: "Powoduje cierpienia fizyczne i emocjonalne oraz sprawia, że ludzkie wysiłki zmierzające do poprawy warunków na świecie (takie jak walka z biedą czy przestępczością) są ostatecznie „poddane daremności” i nie przynoszą trwałych rezultatów.",
                isSummary: false
            },
            {
                front: "12. Jaką nadzieję daje nam okup?",
                back: "Okup daje nadzieję na całkowite uwolnienie z „niewoli zepsucia”. W nowym świecie, pod rządami Jezusa, ludzie zostaną uzdrowieni, co oznacza koniec chorób, bólu, wyrzutów sumienia i śmierci.",
                isSummary: false
            },
            {
                front: "13. O czym jeszcze możemy rozmyślać, przygotowując się do tegorocznej Pamiątki?",
                back: "Możemy wyobrażać sobie życie w pełnym zdrowiu i bez strachu o przyszłość bliskich. Rozmyślanie o tej nadziei działa jak „kotwica dla duszy”, stabilizując naszą wiarę i pomagając przetrwać obecne próby.",
                isSummary: false
            },
            {
                front: "14. Jak grzech wpłynął na naszą więź z Bogiem i dlaczego?",
                back: "Grzech oddzielił ludzi od Boga, czyniąc ich Jego wrogami. Stało się tak dlatego, że świętość i czystość Jehowy nie pozwalają Mu tolerować niegodziwości — grzech stworzył wyrwę, której ludzie sami nie mogli pokonać.",
                isSummary: false
            },
            {
                front: "15. W jakim sensie okup „ułagodził” Jehowę i co umożliwił?",
                back: "Okup „ułagodził” Jehowę w tym sensie, że zadośćuczynił Jego sprawiedliwości (spełnił jej wymogi). Dzięki temu Bóg zyskał podstawę prawną, by przywrócić bliskie relacje z ludźmi i uznawać ich za prawych.",
                isSummary: false
            },
            {
                front: "16. Jaką inną kwestię warto przemyśleć w tygodniach poprzedzających Pamiątkę?",
                back: "Warto cenić to, że dzięki okupowi możemy mieć osobistą, bliską więź z Bogiem, zwracać się do Niego „Ojcze” i nazywać Go swoim „Przyjacielem”, mimo naszej niedoskonałości.",
                isSummary: false
            },
            {
                front: "17. Jak okup dowodzi, że Jehowa jest miłosierny? (Efezjan 2:4, 5).",
                back: "Dowodzi tego fakt, że choć byliśmy „martwi z powodu swoich przewinień”, Jehowa pierwszy wyszedł z inicjatywą ratunku. Odpowiada na wołanie ludzi o pomoc, dając im możliwość poznania prawdy i uzyskania życia wiecznego.",
                isSummary: false
            },
            {
                front: "18. O czym musimy pamiętać, rozmyślając o ofierze okupu?",
                back: "Musimy pamiętać, że okup służy przede wszystkim uświęceniu imienia Jehowy i jest ostateczną odpowiedzią na zarzuty Szatana. Poprzez tę ofiarę Bóg udowadnia swoją miłość i pozwala nam brać udział w obalaniu kłamstw przeciwnika.",
                isSummary: false
            },
            {
                front: "Podsumowanie: Jak okup zapewnia Przebaczenie?",
                back: "Stanowi podstawę prawną dla sprawiedliwego Boga, by mógł On okazywać nam miłosierdzie i oczyszczać nas z win.",
                isSummary: true
            },
            {
                front: "Podsumowanie: Jak okup zapewnia Uzdrowienie?",
                back: "Umożliwia w przyszłości usunięcie wszelkich skutków niedoskonałości — fizycznych, psychicznych i emocjonalnych.",
                isSummary: true
            },
            {
                front: "Podsumowanie: Jak okup zapewnia Pojednanie?",
                back: "Buduje pomost nad wyrwą, jaką stworzył grzech, pozwalając niedoskonałym ludziom cieszyć się bliską, przyjacielską więzią ze Stwórcą.",
                isSummary: true
            }
        ];

        let currentIndex = 0;
        let isFlipped = false;

        const flashcard = document.getElementById('flashcard');
        const container = document.getElementById('card-container');
        const frontText = document.getElementById('card-front-text');
        const backText = document.getElementById('card-back-text');
        const backFace = document.getElementById('card-back-face');
        const counterDisplay = document.getElementById('counter');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        // Renderowanie zawartości karty
        function updateCard() {
            const cardData = cardsData[currentIndex];
            frontText.textContent = cardData.front;
            backText.textContent = cardData.back;
            
            // Formatowanie kart podsumowujących (mniejsza czcionka, inny układ)
            if (cardData.isSummary) {
                backFace.classList.add('summary-mode');
            } else {
                backFace.classList.remove('summary-mode');
            }
            
            counterDisplay.textContent = `${currentIndex + 1} / ${cardsData.length}`;
        }

        // Odwracanie karty
        function toggleCard() {
            isFlipped = !isFlipped;
            flashcard.classList.toggle('flipped');
            if (!isFlipped) {
                flashcard.classList.remove('glow'); // Usuwamy rozbłysk podczas powrotu
            }
        }

        // Dodanie poświaty dokładnie na koniec animacji odwracania
        flashcard.addEventListener('transitionend', (e) => {
            if (e.propertyName === 'transform' && isFlipped) {
                flashcard.classList.add('glow');
            }
        });

        function changeCard(direction) {
            if (isFlipped) {
                toggleCard();
                // Oczekujemy na zakończenie animacji powrotu przed zmianą treści
                setTimeout(() => updateIndex(direction), 300);
            } else {
                updateIndex(direction);
            }
        }

        function updateIndex(direction) {
            if (direction === 'next') {
                currentIndex = (currentIndex + 1) % cardsData.length;
            } else {
                currentIndex = (currentIndex - 1 + cardsData.length) % cardsData.length;
            }
            updateCard();
        }

        // --- Obsługa zdarzeń (Mysz + Klawiatura) ---
        container.addEventListener('click', toggleCard);
        nextBtn.addEventListener('click', () => changeCard('next'));
        prevBtn.addEventListener('click', () => changeCard('prev'));

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                changeCard('next');
            } else if (e.key === 'ArrowLeft') {
                changeCard('prev');
            } else if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault(); // Zapobiega przewijaniu strony spacją
                toggleCard();
            }
        });

        // Inicjalizacja pierwszej karty
        updateCard();

        // --- System Cząsteczek (Particles) w tle ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                // Cząsteczki w kolorze akcentu z delikatną przezroczystością
                this.color = 'rgba(100, 181, 246, ' + (Math.random() * 0.3 + 0.1) + ')';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Odbijanie od krawędzi ekranu
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

    </script>
</body>
</html>
